# ==============================================
# NPDC Dataset Caching Proxy Configuration
# Squid 4.14 for Windows (diladele.com build)
# Mode: Reverse proxy (accelerator) with caching
# ==============================================

# Listen on port 3128 in accelerator (reverse proxy) mode
http_port 3128 accel defaultsite=127.0.0.1 vhost

# Backend: Django dev server on port 10000
cache_peer 127.0.0.1 parent 10000 0 no-query originserver name=django

# Route all requests to the Django backend
cache_peer_access django allow all

# --- DNS FIX (Cygwin Squid cannot resolve 'localhost' without this) ---
dns_nameservers 8.8.8.8 8.8.4.4
hosts_file C:/Windows/System32/drivers/etc/hosts

# --- ACCESS CONTROL ---
acl localnet src 127.0.0.0/8 ::1
http_access allow localnet
http_access deny all

# --- CACHING RULES ---
# Cache dataset files aggressively (7 days = 10080 minutes)
refresh_pattern /media/datasets/  10080  90%  10080

# Allow caching of large files (up to 2GB)
maximum_object_size 2048 MB

# Cache storage: 10GB on disk
cache_dir ufs C:/Squid/var/cache/squid 10000 16 256

# Cache 256MB in memory for fast access
cache_mem 256 MB

# --- LOGGING ---
access_log C:/Squid/var/log/squid/access.log
cache_log C:/Squid/var/log/squid/cache.log
cache_store_log none

# --- MISC ---
visible_hostname npdc-cache
pid_filename C:/Squid/var/run/squid.pid
