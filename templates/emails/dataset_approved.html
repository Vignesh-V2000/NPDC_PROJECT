<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    @media (max-width: 600px) {
        body { font-size: 14px !important; }
        h2 { font-size: 18px !important; }
        p { font-size: 13px !important; line-height: 1.6 !important; }
        table { width: 100% !important; }
    }
</style>
</head>
<body style="font-family: Arial; max-width: 600px; margin: 0 auto; padding: 20px;">

<h2 style="color: #10b981;">🎉 Dataset Approved</h2>

<p>Dear {{ dataset.submitter.username }},</p>

<p>Your dataset <strong>{{ dataset.title }}</strong> has been approved.</p>

<p>Project: {{ dataset.project_name }}</p>
<p>Region: {{ dataset.region }}</p>

<p>You can now share or cite this dataset.</p>

<p>Regards,<br>NPDC Team</p>
