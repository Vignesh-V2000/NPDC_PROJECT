<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    @media (max-width: 600px) {
        body { font-size: 14px !important; }
        h2 { font-size: 18px !important; }
        p { font-size: 13px !important; line-height: 1.6 !important; }
    }
</style>
</head>
<body style="font-family: Arial; max-width: 600px; margin: 0 auto; padding: 20px;">

<h2 style="color: #004F87;">Dataset Status Update</h2>

<p>Dear {{ username }},</p>

<p>Your dataset submission has been reviewed.</p>

<p><strong>Dataset:</strong> {{ title }}</p>
<p><strong>Status:</strong> {{ status }}</p>

{% if reviewer_notes %}
<p><strong>Reviewer Notes:</strong><br>
{{ reviewer_notes }}</p>
{% endif %}

<p>Regards,<br>NPDC Team</p>
