{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Admin Panel</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Optional custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

<style>
    /* Add left margin to avoid overlap when sidebar is full */
    @media (min-width: 992px) {
        .admin-main-wrapper {
            margin-left: 260px;
        }
    }

    /* Responsive Design - Tablet (768px - 1199px) */
    @media (max-width: 1199px) {
        .admin-main-wrapper {
            margin-left: 0;
        }

        .flex-grow-1 {
            padding: 2rem 1.5rem;
        }

        .flex-grow-1 > * {
            max-width: 100%;
        }
    }

    /* Responsive Design - Mobile (480px - 767px) */
    @media (max-width: 767px) {
        body {
            overflow-x: hidden;
        }

        .d-flex {
            flex-direction: column;
        }

        .d-none.d-lg-block {
            display: none !important;
        }

        .flex-grow-1 {
            padding: 1.5rem 1rem;
            width: 100%;
        }

        .admin-main-wrapper {
            margin-left: 0;
        }

        /* Container responsive */
        .container,
        .container-fluid {
            padding-left: 15px;
            padding-right: 15px;
        }
    }

    /* Responsive Design - Extra Small (<480px) */
    @media (max-width: 479px) {
        body {
            overflow-x: hidden;
        }

        .flex-grow-1 {
            padding: 1rem 12px;
            width: 100%;
        }

        .admin-main-wrapper {
            margin-left: 0;
            padding: 0;
        }

        .bg-light {
            background: #f8f9fa !important;
        }

        /* Container responsive */
        .container,
        .container-fluid {
            padding-left: 12px;
            padding-right: 12px;
        }

        /* Forms responsive */
        .form-group,
        .mb-3 {
            margin-bottom: 1rem !important;
        }

        .btn {
            font-size: 0.85rem;
            padding: 0.5rem 0.75rem;
        }

        .btn-lg {
            padding: 0.6rem 1rem;
            font-size: 0.9rem;
        }
    }
</style>

    <div class="d-flex admin-main-wrapper">

        <!-- Sidebar -->
        <div class="d-none d-lg-block">
            {% include "admin/includes/admin_sidebar.html" with is_full_sidebar=True %}
        </div>


        <!-- Main Content -->
        <div class="flex-grow-1 p-4 bg-light">
            {% block admin_content %}
            {% endblock %}
        </div>

    </div>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
